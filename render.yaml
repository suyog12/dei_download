# Render Blueprint for the DEI Downloader.
#
# Deploys two services from one repo:
#   1. dei-downloader-api: FastAPI backend (Python Web Service, free tier)
#   2. dei-downloader-web: React frontend (Static Site - always free on Render)
#
# Render quirks reflected below:
#   - Static sites don't accept a `plan:` field. We omit it.
#   - Static sites use `runtime: static`. Web services use `runtime: python`.
#   - Use `property: hostport` (not `host`) so cross-service env refs get the
#     full FQDN like "dei-downloader-api.onrender.com" instead of the bare
#     service name. `host` alone produces non-resolvable URLs.

services:
  # ------------------------------------------------------------------
  # Backend - FastAPI served by Uvicorn
  # ------------------------------------------------------------------
  - type: web
    name: dei-downloader-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEI_MIN_YEAR
        value: "2000"
      - key: DEI_MAX_YEAR
        value: "2026"
      # Wire CORS_ORIGINS to the frontend service's full hostname.
      # hostport returns e.g. "dei-downloader-web.onrender.com".
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: dei-downloader-web
          property: hostport

  # ------------------------------------------------------------------
  # Frontend - Vite build served as static files (always free on Render)
  # ------------------------------------------------------------------
  - type: web
    name: dei-downloader-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # VITE_API_BASE is baked into the JS bundle at build time.
      # hostport returns the FULL api hostname (e.g.
      # "dei-downloader-api.onrender.com"). Using `host` instead returns only
      # "dei-downloader-api" which produces broken URLs in the browser.
      - key: VITE_API_BASE
        fromService:
          type: web
          name: dei-downloader-api
          property: hostport
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
