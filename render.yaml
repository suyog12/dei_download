# Render Blueprint for the DEI Downloader.
#
# Deploys two services from one repo:
#   1. dei-downloader-api: FastAPI backend (Python Web Service, free tier)
#   2. dei-downloader-web: React frontend (Static Site - always free on Render)
#
# Important Render-specific quirks reflected below:
#   - Static sites are NOT priced by plan tier. Render rejects `plan: free`
#     for static sites. We simply omit the field.
#   - Static sites use `runtime: static`. Web services use `runtime: python`.
#     The `type:` field is `web` for both (Render's naming, not ours).
#   - For a static site to reference the backend URL at build time, we use
#     `fromService: property: host` (not `hostport` — that field is rejected).

services:
  # ------------------------------------------------------------------
  # Backend - FastAPI served by Uvicorn
  # ------------------------------------------------------------------
  - type: web
    name: dei-downloader-api
    runtime: python
    plan: free
    region: oregon  # change if you prefer (frankfurt, singapore, ohio, virginia)
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEI_MIN_YEAR
        value: "2000"
      - key: DEI_MAX_YEAR
        value: "2026"
      # Wire CORS_ORIGINS to the frontend service's hostname. Render substitutes
      # this at deploy time so the two services stay in sync without manual
      # URL copying. Our backend's _normalize_origin() prepends https:// if
      # the value is a bare hostname.
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: dei-downloader-web
          property: host
    # Free-tier services sleep after 15 min of inactivity; first request
    # after sleep takes ~30-60s to cold-start. Acceptable for portfolio use.

  # ------------------------------------------------------------------
  # Frontend - Vite build served as static files (always free on Render)
  # ------------------------------------------------------------------
  - type: web
    name: dei-downloader-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # SPA routing: any unknown path falls through to index.html so React
    # handles the routing.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # VITE_API_BASE is baked into the JS bundle at build time. Our frontend's
      # resolveApiBase() prepends https:// if the value is a bare hostname.
      - key: VITE_API_BASE
        fromService:
          type: web
          name: dei-downloader-api
          property: host
    # Cache long-hashed assets aggressively; don't cache index.html so that
    # deploys are visible to users immediately.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
